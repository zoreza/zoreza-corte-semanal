services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoreza
      POSTGRES_PASSWORD: zoreza
      POSTGRES_DB: zoreza_pro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoreza -d zoreza_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://zoreza:zoreza@db:5432/zoreza_pro
      SECRET_KEY: ${SECRET_KEY:-cambiar-esta-clave-en-produccion-usar-openssl-rand-hex-64}
      APP_TZ: America/Mexico_City
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
